<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <title>PT34 Music</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --purple: #b388ff;
      --black: #000000;
      --soft: #676767;
      --line: #ececec;
      --nav-h: 68px;
    }

    body {
      background: #ffffff;
      color: #000000;
      overflow-x: hidden;
      padding-bottom: 150px;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .view {
      display: none;
      min-height: calc(100vh - 72px);
      padding-bottom: 20px;
    }

    .view.active {
      display: block;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 50;
      height: 72px;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,.98);
      border-bottom: 1px solid var(--line);
    }

    .logo-container {
      background: #050505;
      color: var(--purple);
      border-radius: 5px;
      padding: 8px 13px;
      font-size: 20px;
      font-style: italic;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .btn-device {
      background: #f1f1f1;
      color: #333;
      border-radius: 22px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 800;
    }

    .btn-icon {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      background: #18182d;
      color: #ffffff;
      border-radius: 7px;
      font-size: 18px;
    }

    .btn-settings {
      background: transparent;
      color: #333;
      padding: 4px;
      font-size: 23px;
    }

    .section {
      margin-top: 30px;
      padding-left: 20px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 10px;
      padding-right: 20px;
      margin-bottom: 15px;
    }

    .section-title {
      color: #000;
      font-size: 29px;
      font-weight: 850;
      letter-spacing: -.8px;
    }

    .explore-btn {
      background: transparent;
      color: #5b5b68;
      padding: 4px;
      font-size: 15px;
      font-weight: 800;
      white-space: nowrap;
    }

    .scroll-row {
      display: flex;
      gap: 15px;
      overflow-x: auto;
      padding-right: 20px;
      padding-bottom: 12px;
      scrollbar-width: none;
    }

    .scroll-row::-webkit-scrollbar {
      display: none;
    }

    .card {
      width: 150px;
      min-width: 150px;
    }

    .card-cover {
      position: relative;
      display: block;
      width: 150px;
      height: 150px;
      overflow: hidden;
      border-radius: 12px;
      background: #161625;
      box-shadow: 0 4px 14px rgba(0,0,0,.14);
    }

    .card-cover img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-badges {
      position: absolute;
      right: 8px;
      bottom: 8px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .badge-btn {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 9px;
      background: #ffffff;
      color: #000000;
      font-size: 17px;
      box-shadow: 0 3px 9px rgba(0,0,0,.24);
    }

    .card-title {
      margin-top: 11px;
      color: #000;
      font-size: 17px;
      font-weight: 850;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-subtitle {
      margin-top: 4px;
      color: var(--soft);
      font-size: 14px;
      line-height: 1.32;
      display: -webkit-box;
      overflow: hidden;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .search-container,
    .library-container {
      padding: 20px;
    }

    .search-box {
      position: relative;
      margin-bottom: 18px;
    }

    .search-box i {
      position: absolute;
      top: 50%;
      left: 17px;
      color: #656565;
      font-size: 22px;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      min-height: 62px;
      border: 1px solid #d9d9d9;
      border-radius: 14px;
      outline: none;
      background: #fafafa;
      color: #000;
      padding: 15px 18px 15px 53px;
      font-size: 18px;
      font-weight: 750;
    }

    .search-input:focus {
      border-color: #a77bea;
      box-shadow: 0 0 0 3px rgba(179,136,255,.15);
    }

    .youtube-player-shell {
      display: none;
      margin-bottom: 18px;
      padding: 10px;
      overflow: hidden;
      border-radius: 14px;
      background: #111116;
    }

    .youtube-player-shell.visible {
      display: block;
    }

    #ytPlayer {
      width: 100%;
      min-height: 220px;
      overflow: hidden;
      border-radius: 10px;
      background: #000000;
    }

    #ytPlayer iframe {
      width: 100% !important;
      min-height: 220px !important;
      border: 0;
    }

    .youtube-now-playing {
      padding: 11px 4px 3px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .loader {
      display: none;
      width: 36px;
      height: 36px;
      margin: 30px auto;
      border: 4px solid #ededed;
      border-top-color: #000000;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .track-list {
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .track-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      gap: 12px;
      padding: 10px;
      text-align: left;
      background: #ffffff;
      border: 1px solid #f0f0f0;
      border-radius: 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }

    .track-item.playing {
      border-color: #b388ff;
      background: #fcfaff;
    }

    .track-item-left {
      display: flex;
      align-items: center;
      flex: 1;
      min-width: 0;
      gap: 13px;
    }

    .track-img {
      width: 58px;
      height: 58px;
      flex: 0 0 auto;
      object-fit: cover;
      border-radius: 9px;
      background: #e8e8e8;
    }

    .track-info {
      display: flex;
      flex-direction: column;
      min-width: 0;
      gap: 4px;
    }

    .track-title {
      color: #000;
      font-size: 16px;
      font-weight: 850;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      color: #666;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-play-icon {
      padding: 8px;
      color: #000;
      font-size: 25px;
    }
